name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: python -m ruff check .

      - name: Format check (black)
        run: python -m black --check --config pyproject.toml .

  test:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run migrations (idempotency guard)
        run: |
          python migrate.py
          python migrate.py

      - name: Run tests
        run: python -m pytest -q

  container-build-and-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build container image
        run: docker build -t mccain-capital-app:ci -f Containerfile .

      - name: Smoke test container endpoints
        run: |
          docker run -d --name mccain-capital-smoke -p 5001:5001 mccain-capital-app:ci
          sleep 3
          curl -fsS http://127.0.0.1:5001/healthz
          curl -fsS http://127.0.0.1:5001/dashboard >/dev/null
          curl -fsS http://127.0.0.1:5001/journal >/dev/null
          curl -fsS http://127.0.0.1:5001/analytics >/dev/null
          docker logs --tail 80 mccain-capital-smoke
          docker rm -f mccain-capital-smoke

  visual-regression-smoke:
    runs-on: ubuntu-latest
    needs: container-build-and-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          python -m playwright install --with-deps chromium

      - name: Start app container
        run: |
          docker build -t mccain-capital-app:visual -f Containerfile .
          docker run -d --name mccain-capital-visual -p 5001:5001 mccain-capital-app:visual
          sleep 3
          curl -fsS http://127.0.0.1:5001/healthz

      - name: Capture desktop/mobile visual smoke screenshots
        run: |
          VISUAL_BASE_URL=http://127.0.0.1:5001 \
          VISUAL_OUT_DIR=artifacts/visual \
          python tests/visual_smoke.py

      - name: Upload visual artifacts
        uses: actions/upload-artifact@v4
        with:
          name: visual-smoke-screenshots
          path: artifacts/visual
          if-no-files-found: error

      - name: Stop app container
        if: always()
        run: docker rm -f mccain-capital-visual || true

  deploy-guardrails:
    runs-on: ubuntu-latest
    needs: visual-regression-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Guardrail summary
        run: |
          echo "Deploy guardrails passed:"
          echo "- main branch push"
          echo "- lint + format checks"
          echo "- migrations executed twice (idempotent)"
          echo "- tests green"
          echo "- container smoke checks green"
          echo "- visual desktop/mobile smoke screenshots captured"
